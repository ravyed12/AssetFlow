<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssetFlow · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="dashboard" data-base="./" data-crumb="Dashboard">

<div class="app">
  <aside class="sidebar" id="sidebar-root"></aside>

  <div class="main">
    <div class="topbar" id="topbar-root"></div>

    <div class="content">

      <div class="page-head">
        <div>
          <div class="eyebrow" id="eyebrow">Loading…</div>
          <div class="h1" id="greeting">Good morning.</div>
        </div>
        <div class="head-actions">
          <button class="btn" id="syncBtn">
            <svg viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 0 1 14-5.3M20 12a8 8 0 0 1-14 5.3M4 4v5h5M20 20v-5h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Sync
          </button>
          <button class="btn btn-primary" id="registerBtn">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Register Asset
          </button>
        </div>
      </div>

      <div class="alert" id="alertBox"></div>

      <div class="stat-grid" id="statGrid"></div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-head">
          <div>
            <div class="card-title">Asset count over time</div>
            <div class="card-sub">Active vs. in maintenance · Aug–Jan</div>
          </div>
          <div class="legend">
            <span><i style="background:#3B63F5"></i>Active</span>
            <span><i style="background:#D9A441"></i>Maintenance</span>
          </div>
        </div>
        <svg id="chartSvg" viewBox="0 0 900 260" style="width:100%; height:230px; overflow:visible;"></svg>
      </div>

      <div class="grid-half">
        <div class="card">
          <div class="card-head"><div><div class="card-title">By department</div><div class="card-sub">Asset count</div></div></div>
          <div class="bars" id="deptBars"></div>
        </div>
        <div class="card">
          <div class="card-head"><div><div class="card-title">By category</div><div class="card-sub">231 total</div></div></div>
          <div class="donut-wrap">
            <svg id="categoryDonut" viewBox="0 0 42 42" style="width:140px; height:140px; flex-shrink:0; transform:rotate(-90deg);"></svg>
            <div class="donut-legend" id="categoryLegend"></div>
          </div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-head">
            <div class="card-title">Recently registered</div>
            <a class="view-all" href="pages/asset-registry.html">View all assets</a>
          </div>
          <table>
            <thead><tr><th>Asset</th><th>Category</th><th>Assigned to</th><th>Status</th><th>Value</th></tr></thead>
            <tbody id="recentAssetsBody"></tbody>
          </table>
        </div>

        <div class="card">
          <div class="card-head">
            <div class="card-title">Maintenance queue</div>
            <a class="view-all" href="pages/maintenance.html">All</a>
          </div>
          <div id="mqList"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
